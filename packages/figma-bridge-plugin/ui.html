<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500&display=swap">

<style>
  :root {
    --bg-default: #121212;
    --bg-brand: #c9fb8c;
    --bg-brand-subtle: #253a00;
    --text-default: #f5f5f5;
    --text-subtle: #dfdfdf;
    --text-brand: #e7ffcd;
    --text-warning: #ffe5ad;
    --text-success: #b5fcc2;
    --text-muted: #8c8c8c;
    --border-brand: #5d8227;
    --border-subtle: #212121;
    --button-fg: #121212;
    --button-bg: #c9fb8c;
    --button-stroke: #5d8227;
    --radius-md: 8px;
    --radius-full: 9999px;
  }
  html, body {
    height: 100%;
    overflow: hidden;
  }
  body {
    font-family: 'Sora', Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    margin: 0;
    background: #121212;
    color: #f5f5f5;
    -webkit-font-smoothing: antialiased;
  }
  .app {
    box-sizing: border-box;
    height: 100%;
    padding: 16px;
    display: flex;
    flex-direction: row;
    align-items: stretch;
    gap: 16px;
    overflow: hidden;
    background: #121212;
  }
  .main-column {
    width: 264px;
    flex: 0 0 264px;
    display: flex;
    flex-direction: column;
  }
  .log-column {
    width: 264px;
    flex: 0 0 264px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    opacity: 0;
    transform: translateX(-12px);
    pointer-events: none;
    transition: opacity 160ms ease, transform 160ms ease;
  }
  .app.log-open .log-column {
    opacity: 1;
    transform: translateX(0);
    pointer-events: auto;
  }
  .status-row {
    display: flex;
    align-items: center;
    gap: 8px;
    height: 40px;
    flex: 0 0 40px;
  }
  .pulse-wrap {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 0 0 36px;
  }
  .pulse {
    width: 20px;
    height: 20px;
    background: #c9fb8c;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(93, 130, 39, 0.55); }
    70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(93, 130, 39, 0); }
    100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(93, 130, 39, 0); }
  }
  .status-text {
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-width: 0;
  }
  #status {
    font-family: 'Sora', Inter, sans-serif;
    font-size: 16px;
    line-height: 24px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: #e7ffcd;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #substatus {
    font-family: 'Sora', Inter, sans-serif;
    font-size: 12px;
    line-height: 16px;
    font-weight: 400;
    letter-spacing: 0.02em;
    color: #dfdfdf;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .panel {
    background: transparent;
    border: 0;
    padding: 0;
    box-sizing: border-box;
  }
  .selection-panel {
    margin-top: 16px;
  }
  .qa-panel {
    margin-top: 16px;
  }
  .panel-title {
    font-family: 'Sora', Inter, sans-serif;
    font-size: 14px;
    line-height: 20px;
    font-weight: 500;
    letter-spacing: 0.01em;
    color: #f5f5f5;
    margin: 0 0 16px 0;
  }
  #selection-state {
    font-family: 'Sora', Inter, sans-serif;
    font-size: 12px;
    line-height: 16px;
    font-weight: 400;
    color: #f5f5f5;
  }
  .selection-lines {
    display: flex;
    flex-direction: column;
  }
  .selection-line {
    height: 16px;
    margin-bottom: 4px;
    color: #f5f5f5;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .selection-line:last-child {
    margin-bottom: 0;
  }
  .doc-status {
    position: relative;
    display: inline-flex;
    width: fit-content;
    max-width: 100%;
    color: #e7ffcd;
    cursor: help;
    outline: none;
  }
  .doc-status.warning {
    color: #ffe5ad;
  }
  .doc-status:focus-visible {
    text-decoration: underline;
  }
  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .action-button {
    height: 42px;
    padding: 0 12px;
    border-radius: 9999px;
    border: 1px solid #5d8227;
    background: transparent;
    color: #e7ffcd;
    font-family: 'Sora', Inter, sans-serif;
    font-size: 14px;
    line-height: 20px;
    font-weight: 500;
    letter-spacing: 0.01em;
    cursor: pointer;
    transition: background-color 120ms ease, color 120ms ease;
  }
  .action-button:hover {
    background: rgba(201, 251, 140, 0.12);
  }
  .action-button.primary {
    background: #c9fb8c;
    color: #121212;
  }
  .action-button.primary:hover {
    background: #d8ffa4;
  }
  .action-button:disabled {
    color: #5d5d5d;
    border-color: #2a2a2a;
    background: #1b1b1b;
    cursor: default;
  }
  .action-button.primary:disabled {
    background: #2a2a2a;
    color: #5d5d5d;
  }
  .log-toggle-row {
    margin-top: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    height: 18px;
    flex: 0 0 18px;
    padding-top: 16px;
  }
  .log-toggle {
    position: relative;
    width: 32px;
    height: 18px;
    flex: 0 0 32px;
    border: 1px solid #5d8227;
    border-radius: 9999px;
    padding: 0;
    background: transparent;
    cursor: pointer;
    transition: background-color 120ms ease;
  }
  .log-toggle::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #c9fb8c;
    transition: transform 120ms ease;
  }
  .log-toggle[aria-pressed="true"] {
    background: #253a00;
  }
  .log-toggle[aria-pressed="true"]::after {
    transform: translateX(14px);
  }
  .log-toggle-label {
    font-family: 'Sora', Inter, sans-serif;
    font-size: 12px;
    line-height: 16px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: #f5f5f5;
  }
  .log-box {
    flex: 1 1 auto;
    min-height: 0;
    box-sizing: border-box;
    padding: 8px;
    border: 1px solid #5d8227;
    border-radius: 8px;
    background: transparent;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .log-box.has-qa {
    flex: 0 0 148px;
  }
  #session-log {
    flex: 1 1 auto;
    min-height: 0;
    overflow-y: auto;
    font-family: 'Sora', Inter, sans-serif;
    font-size: 12px;
    line-height: 16px;
    font-weight: 400;
    color: #f5f5f5;
  }
  .log-entry {
    display: flex;
    gap: 6px;
    margin-bottom: 4px;
  }
  .log-entry:last-child {
    margin-bottom: 0;
  }
  .log-time {
    color: #8c8c8c;
    flex: 0 0 auto;
  }
  .log-entry-msg {
    color: #f5f5f5;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .log-session {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid #212121;
    color: #8c8c8c;
    font-family: 'Sora', Inter, sans-serif;
    font-size: 11px;
    line-height: 16px;
    font-weight: 500;
    letter-spacing: 0.02em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 0 0 auto;
  }
  #qa-report {
    display: none;
    flex: 0 0 152px;
    box-sizing: border-box;
    padding: 4px 8px;
    border: 1px solid #5d8227;
    border-radius: 8px;
    background: transparent;
    font-family: 'Sora', Inter, sans-serif;
    font-size: 12px;
    line-height: 16px;
    color: #f5f5f5;
    overflow: hidden;
  }
  #qa-report.has-report {
    display: block;
  }
  .qa-stat {
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 20px;
    padding: 4px 0;
  }
  .qa-stat + .qa-stat {
    border-top: 1px solid #212121;
  }
  .qa-stat-label {
    color: #f5f5f5;
    font-weight: 500;
  }
  .qa-stat-value {
    color: #f5f5f5;
    font-weight: 400;
  }
  .qa-stat.is-error .qa-stat-value {
    color: #ffe5ad;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 60%;
  }
  .empty {
    color: #8c8c8c;
  }
</style>

<div id="app" class="app">
  <div class="main-column">
    <div class="status-row">
      <div class="pulse-wrap"><div class="pulse"></div></div>
      <div class="status-text">
        <div id="status">Listening for Agent</div>
        <div id="substatus">Waiting...</div>
      </div>
    </div>
    <div class="panel selection-panel">
      <div class="panel-title">Current Selection</div>
      <div id="selection-state" class="empty">No selection yet.</div>
    </div>
    <div class="panel qa-panel">
      <div class="panel-title">QA</div>
      <div class="actions">
        <button id="qa-check" class="action-button primary" type="button" title="Scan the current selection (or page if nothing is selected) for color, spacing, type, and border values that don't match design system tokens. Read-only — nothing in the file changes.">Check</button>
        <button id="qa-fix" class="action-button" type="button" title="Run the same scan as Check, then bind only high-confidence matches to the right tokens. Lower-confidence violations are listed under Needs review for you to handle manually.">Bind Safe</button>
      </div>
    </div>
    <div class="log-toggle-row">
      <button id="log-toggle" class="log-toggle" type="button" aria-label="Show Log" aria-pressed="false" title="Expand the panel to show the session log and the most recent QA summary."></button>
      <span class="log-toggle-label">Show Log</span>
    </div>
  </div>
  <div class="log-column">
    <div id="log-box" class="log-box">
      <div id="session-log" class="empty">No actions yet.</div>
      <div id="session-meta" class="log-session">Session: pending</div>
    </div>
    <div id="qa-report" class="qa-empty">No QA run yet.</div>
  </div>
</div>

<script>
  let isExtracting = false;
  let _watchdog = null;
  let _sessionLog = [];
  let _sessionId = '';
  let _isLogOpen = false;
  let _hasQaReport = false;
  var _currentFileKey = '';
  const _capabilities = [
    'extract-all',
    'extract-selection',
    'build-showcase',
    'apply-ds-setup',
    'build-doc',
    'qa-audit',
    'update-primitives',
    'update-tokens',
    'setup-repairs',
    'reset-figlets-file'
  ];

  function _fmtTime(ts) {
    const d = new Date(ts);
    const h = String(d.getHours()).padStart(2, '0');
    const m = String(d.getMinutes()).padStart(2, '0');
    const s = String(d.getSeconds()).padStart(2, '0');
    return h + ':' + m + ':' + s;
  }

  function _renderSessionLog() {
    const el = document.getElementById('session-log');
    if (!_sessionLog.length) {
      el.className = 'empty';
      el.innerText = 'No actions yet.';
      return;
    }

    el.className = '';
    el.innerHTML = _sessionLog.map(function(entry) {
      return '<div class="log-entry"><span class="log-time">' +
        _fmtTime(entry.ts) +
        '</span><span class="log-entry-msg">' +
        _escapeHtml(entry.message) +
        '</span></div>';
    }).join('');
    el.scrollTop = el.scrollHeight;
  }

  function _setLogOpen(open) {
    const next = !!open;
    if (next === _isLogOpen) return;
    _isLogOpen = next;
    const app = document.getElementById('app');
    const toggle = document.getElementById('log-toggle');
    toggle.setAttribute('aria-pressed', _isLogOpen ? 'true' : 'false');

    if (_isLogOpen) {
      parent.postMessage({ pluginMessage: { type: 'ui-resize', expanded: _isLogOpen } }, '*');
      requestAnimationFrame(function() {
        app.className = 'app log-open';
        _renderSessionLog();
      });
    } else {
      app.className = 'app';
      setTimeout(function() {
        if (!_isLogOpen) {
          parent.postMessage({ pluginMessage: { type: 'ui-resize', expanded: _isLogOpen } }, '*');
        }
      }, 160);
    }
  }

  function _appendLog(message) {
    _sessionLog.push({
      ts: Date.now(),
      message: message
    });
    _renderSessionLog();
  }

  function _setQaButtonsDisabled(disabled) {
    document.getElementById('qa-check').disabled = disabled;
    document.getElementById('qa-fix').disabled = disabled;
  }

  function _renderQaReport(data) {
    const el = document.getElementById('qa-report');
    const logBox = document.getElementById('log-box');
    if (!data) {
      el.className = 'qa-empty';
      el.innerText = 'No QA run yet.';
      _hasQaReport = false;
      logBox.className = 'log-box';
      return;
    }
    if (data.error) {
      el.className = 'has-report';
      el.innerHTML = '<div class="qa-stat is-error"><span class="qa-stat-label">QA failed</span><span class="qa-stat-value">' +
        _escapeHtml(data.error) + '</span></div>';
      _hasQaReport = true;
      logBox.className = 'log-box has-qa';
      if (!_isLogOpen) _setLogOpen(true);
      return;
    }

    const byType = data.byType || {};
    const parts = [
      ['QA Scope', data.scope || 'Selection'],
      ['Violations', data.violationCount || 0],
      ['Fixed', data.fixedCount || 0],
      ['Needs review', data.failedCount || 0],
      ['Color', byType.color || 0],
      ['Spacing', byType.spacing || 0],
      ['Type', byType.typography || 0]
    ];
    el.className = 'has-report';
    el.innerHTML = parts.map(function(row) {
      return '<div class="qa-stat"><span class="qa-stat-label">' +
        _escapeHtml(row[0]) +
        '</span><span class="qa-stat-value">' +
        _escapeHtml(row[1]) +
        '</span></div>';
    }).join('');
    _hasQaReport = true;
    logBox.className = 'log-box has-qa';
    if (!_isLogOpen) _setLogOpen(true);
  }

  function _runLocalQa(fix) {
    if (isExtracting) return;
    isExtracting = true;
    _setQaButtonsDisabled(true);
    _armWatchdog(fix ? 'QA safe bind' : 'QA check', 60000);
    document.getElementById('status').innerText = fix ? 'Binding safe variables...' : 'Running QA...';
    document.getElementById('substatus').innerText = fix
      ? 'Applying high-confidence bindings only.'
      : 'Checking selection or current page.';
    _appendLog(fix ? 'Started local QA safe bind.' : 'Started local QA check.');
    parent.postMessage({ pluginMessage: { type: 'qa-audit', data: { fix: !!fix, local: true } } }, '*');
  }

  function _escapeHtml(value) {
    return String(value == null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function _setSelectionState(data) {
    const el = document.getElementById('selection-state');
    const fileName = data && data.fileName ? data.fileName : 'Unknown';
    const pageName = data && data.pageName ? data.pageName : 'Unknown';
    if (!data || !data.count) {
      el.className = '';
      el.innerHTML =
        '<div class="selection-lines">' +
          '<div class="selection-line">File: ' + _escapeHtml(fileName) + '</div>' +
          '<div class="selection-line">Page: ' + _escapeHtml(pageName) + '</div>' +
          '<div class="selection-line">Selected: None</div>' +
          '<div class="selection-line">Type: None</div>' +
          '<div class="selection-line"><span class="doc-status warning" tabindex="0" title="' +
            _escapeHtml('Select one component or component set in Figma, then confirm in chat to document it.') +
            '">Undocumentable</span></div>' +
        '</div>';
      return;
    }

    const types = Array.isArray(data.types) ? data.types : [];
    const names = Array.isArray(data.names) ? data.names : [];
    const hasDocumentableSelection = data.count === 1 && (types[0] === 'COMPONENT' || types[0] === 'COMPONENT_SET');
    if (!hasDocumentableSelection) {
      el.className = '';
      el.innerHTML =
        '<div class="selection-lines">' +
          '<div class="selection-line">File: ' + _escapeHtml(fileName) + '</div>' +
          '<div class="selection-line">Page: ' + _escapeHtml(pageName) + '</div>' +
          '<div class="selection-line">Selected: ' + _escapeHtml(names.join(', ') || 'Unknown') + '</div>' +
          '<div class="selection-line">Type: ' + _escapeHtml(types.join(', ') || 'Unknown') + '</div>' +
          '<div class="selection-line"><span class="doc-status warning" tabindex="0" title="' +
            _escapeHtml('Only a single component or component set can be documented. Select one documentable node, then confirm in chat.') +
            '">Undocumentable</span></div>' +
        '</div>';
      return;
    }

    el.className = '';
    el.innerHTML =
      '<div class="selection-lines">' +
        '<div class="selection-line">File: ' + _escapeHtml(fileName) + '</div>' +
        '<div class="selection-line">Page: ' + _escapeHtml(pageName) + '</div>' +
        '<div class="selection-line">Selected: ' + _escapeHtml(names[0] || 'Unknown') + '</div>' +
        '<div class="selection-line">Type: ' + _escapeHtml(types[0] || 'Unknown') + '</div>' +
        '<div class="selection-line"><span class="doc-status" tabindex="0" title="' +
          _escapeHtml('This selection can be documented because it is one component or component set.') +
          '">Documentable</span></div>' +
      '</div>';
  }

  function _armWatchdog(label, ms) {
    if (_watchdog) clearTimeout(_watchdog);
    _watchdog = setTimeout(function() {
      _watchdog = null;
      document.getElementById('status').innerText = 'Listening for Agent';
      document.getElementById('substatus').innerText = label + ' timed out — resuming.';
      _appendLog(label + ' timed out; resuming poll loop.');
      isExtracting = false;
      poll();
    }, ms);
  }

  function _disarmWatchdog() {
    if (_watchdog) { clearTimeout(_watchdog); _watchdog = null; }
  }

  async function poll() {
    if (isExtracting) return;
    if (!_sessionId) {
      await new Promise(function(resolve) { setTimeout(resolve, 250); });
      if (!isExtracting) poll();
      return;
    }

    try {
      const res = await fetch(
        'http://localhost:1337/poll?sessionId=' +
        encodeURIComponent(_sessionId) +
        '&capabilities=' +
        encodeURIComponent(_capabilities.join(',')) +
        '&fileKey=' +
        encodeURIComponent(_currentFileKey)
      );
      if (res.ok) {
        const data = await res.json();
        if (data.command === 'extract' || data.command === 'extract-all') {
          isExtracting = true;
          _armWatchdog('Sync', 30000);
          document.getElementById('status').innerText = 'Extracting data...';
          document.getElementById('substatus').innerText = 'Sync triggered by agent.';
          _appendLog('Received command: sync_figma_data.');
          parent.postMessage({ pluginMessage: { type: 'extract-all' } }, '*');
        } else if (data.command === 'extract-selection') {
          isExtracting = true;
          _armWatchdog('Inspect', 12000);
          document.getElementById('status').innerText = 'Extracting selection...';
          document.getElementById('substatus').innerText = 'Inspect triggered by agent.';
          _appendLog('Received command: inspect_component.');
          parent.postMessage({ pluginMessage: { type: 'extract-selection' } }, '*');
        } else if (data.command === 'build-showcase') {
          isExtracting = true;
          _armWatchdog('Showcase', 120000);
          document.getElementById('status').innerText = 'Building showcase...';
          document.getElementById('substatus').innerText = 'Rendering token tables in Figma.';
          _appendLog('Received command: build_ds_showcase.');
          parent.postMessage({ pluginMessage: { type: 'build-showcase', data: data.data || {} } }, '*');
        } else if (data.command === 'apply-ds-setup') {
          isExtracting = true;
          _armWatchdog('DS setup', 60000);
          document.getElementById('status').innerText = 'Creating collections...';
          document.getElementById('substatus').innerText = 'Building DS variables in Figma.';
          _appendLog('Received command: apply_ds_setup.');
          parent.postMessage({ pluginMessage: { type: 'apply-ds-setup', data: data.data } }, '*');
        } else if (data.command === 'build-doc') {
          isExtracting = true;
          _armWatchdog('Doc build', 60000);
          document.getElementById('status').innerText = 'Building component doc...';
          document.getElementById('substatus').innerText = 'Rendering spec sheet in Figma.';
          _appendLog('Received command: generate_component_doc.');
          parent.postMessage({ pluginMessage: { type: 'build-doc', data: data.data } }, '*');
        } else if (data.command === 'qa-audit') {
          isExtracting = true;
          _armWatchdog('QA audit', 60000);
          document.getElementById('status').innerText = 'Running QA audit...';
          document.getElementById('substatus').innerText = 'Checking bindings in Figma.';
          _appendLog('Received command: qa_binding_audit.');
          parent.postMessage({ pluginMessage: { type: 'qa-audit', data: data.data } }, '*');
        } else if (data.command === 'update-primitives') {
          isExtracting = true;
          _armWatchdog('Primitives update', 60000);
          document.getElementById('status').innerText = 'Updating primitives...';
          document.getElementById('substatus').innerText = 'Overwriting primitive values in Figma.';
          _appendLog('Received command: update_ds_primitives.');
          parent.postMessage({ pluginMessage: { type: 'update-primitives', data: data.data } }, '*');
        } else if (data.command === 'update-tokens') {
          isExtracting = true;
          _armWatchdog('Token update', 60000);
          document.getElementById('status').innerText = 'Updating tokens...';
          document.getElementById('substatus').innerText = 'Applying approved radius/border variables.';
          _appendLog('Received command: update_ds_tokens.');
          parent.postMessage({ pluginMessage: { type: 'update-tokens', data: data.data } }, '*');
        } else if (data.command === 'apply-setup-repairs') {
          isExtracting = true;
          _armWatchdog('Setup repairs', 60000);
          document.getElementById('status').innerText = 'Applying setup repairs...';
          document.getElementById('substatus').innerText = 'Creating approved semantic variables.';
          _appendLog('Received command: apply_ds_setup_repairs.');
          parent.postMessage({ pluginMessage: { type: 'apply-setup-repairs', data: data.data } }, '*');
        } else if (data.command === 'reset-figlets-file') {
          isExtracting = true;
          _armWatchdog('Reset', 60000);
          document.getElementById('status').innerText = 'Resetting file...';
          document.getElementById('substatus').innerText = 'Removing local variables, styles, and canvas content.';
          _appendLog('Received command: reset_figlets_file.');
          parent.postMessage({ pluginMessage: { type: 'reset-figlets-file', data: data.data || {} } }, '*');
        }
      }
    } catch (err) {
      document.getElementById('status').innerText = 'Offline';
      document.getElementById('substatus').innerText = 'Receiver not running. Retrying...';
      await new Promise(function(resolve) { setTimeout(resolve, 2000); });
    }

    if (!isExtracting) {
      poll();
    }
  }

  onmessage = async (event) => {
    const msg = event.data.pluginMessage;

    if (msg.fileKey) {
      _currentFileKey = msg.fileKey;
    }

    if (msg.type === 'selection-state') {
      _setSelectionState(msg.data);
      return;
    }

    if (msg.type === 'session-meta') {
      _sessionId = (msg.data && msg.data.sessionId) ? msg.data.sessionId : '';
      document.getElementById('session-meta').innerText = 'Session: ' + (msg.data && msg.data.sessionId ? msg.data.sessionId : 'unknown');
      return;
    }

    if (msg.type === 'session-log-history') {
      _sessionLog = Array.isArray(msg.data) ? msg.data.slice() : [];
      _renderSessionLog();
      return;
    }

    if (msg.type === 'session-log-entry') {
      _sessionLog.push(msg.data);
      _renderSessionLog();
      return;
    }

    if (msg.type === 'showcase-built') {
      _disarmWatchdog();
      document.getElementById('status').innerText = 'Sending result...';
      try {
        await fetch('http://localhost:1337/sync-showcase?fileKey=' + encodeURIComponent(_currentFileKey), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Figlets-Session': _sessionId },
          body: JSON.stringify(msg.data)
        });
        document.getElementById('status').innerText = 'Listening for Agent';
        document.getElementById('substatus').innerText = 'Showcase built successfully.';
        _appendLog(msg.data.error ? 'Showcase build returned an error.' : 'Showcase result sent to receiver.');
      } catch (err) {
        document.getElementById('status').innerText = 'Connection failed';
        document.getElementById('substatus').innerText = 'Could not reach localhost:1337';
        _appendLog('Failed to send showcase result to receiver.');
      }
      isExtracting = false;
      poll();
      return;
    }

    if (msg.type === 'doc-built') {
      _disarmWatchdog();
      document.getElementById('status').innerText = 'Sending result...';
      try {
        await fetch('http://localhost:1337/sync-doc-build?fileKey=' + encodeURIComponent(_currentFileKey), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Figlets-Session': _sessionId },
          body: JSON.stringify(msg.data)
        });
        document.getElementById('status').innerText = 'Listening for Agent';
        document.getElementById('substatus').innerText = msg.data.error ? 'Doc build failed.' : 'Spec sheet rendered.';
        _appendLog(msg.data.error ? 'Doc build failed in plugin.' : 'Doc build result sent to receiver.');
      } catch (err) {
        document.getElementById('status').innerText = 'Connection failed';
        document.getElementById('substatus').innerText = 'Could not reach localhost:1337';
        _appendLog('Failed to send doc build result to receiver.');
      }
      isExtracting = false;
      poll();
      return;
    }

    if (msg.type === 'ds-setup-done') {
      _disarmWatchdog();
      document.getElementById('status').innerText = 'Sending result...';
      try {
        await fetch('http://localhost:1337/sync-ds-setup?fileKey=' + encodeURIComponent(_currentFileKey), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Figlets-Session': _sessionId },
          body: JSON.stringify(msg.data)
        });
        document.getElementById('status').innerText = 'Listening for Agent';
        document.getElementById('substatus').innerText = msg.data.error ? 'Setup failed.' : 'DS collections created.';
        _appendLog(msg.data.error ? 'DS setup failed in plugin.' : 'DS setup result sent to receiver.');
      } catch (err) {
        document.getElementById('status').innerText = 'Connection failed';
        document.getElementById('substatus').innerText = 'Could not reach localhost:1337';
        _appendLog('Failed to send DS setup result to receiver.');
      }
      isExtracting = false;
      poll();
      return;
    }

    if (msg.type === 'primitives-update-done') {
      _disarmWatchdog();
      document.getElementById('status').innerText = 'Sending result...';
      try {
        await fetch('http://localhost:1337/sync-update-primitives?fileKey=' + encodeURIComponent(_currentFileKey), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Figlets-Session': _sessionId },
          body: JSON.stringify(msg.data)
        });
        document.getElementById('status').innerText = 'Listening for Agent';
        document.getElementById('substatus').innerText = msg.data.error ? 'Update failed.' : 'Primitives updated.';
        _appendLog(msg.data.error ? 'Primitives update failed in plugin.' : 'Primitives update result sent to receiver.');
      } catch (err) {
        document.getElementById('status').innerText = 'Connection failed';
        document.getElementById('substatus').innerText = 'Could not reach localhost:1337';
        _appendLog('Failed to send primitives update result to receiver.');
      }
      isExtracting = false;
      poll();
      return;
    }

    if (msg.type === 'tokens-update-done') {
      _disarmWatchdog();
      document.getElementById('status').innerText = 'Sending result...';
      try {
        await fetch('http://localhost:1337/sync-update-tokens?fileKey=' + encodeURIComponent(_currentFileKey), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Figlets-Session': _sessionId },
          body: JSON.stringify(msg.data)
        });
        document.getElementById('status').innerText = 'Listening for Agent';
        document.getElementById('substatus').innerText = msg.data.error ? 'Token update failed.' : 'Tokens updated.';
        _appendLog(msg.data.error ? 'Token update failed in plugin.' : 'Token update result sent to receiver.');
      } catch (err) {
        document.getElementById('status').innerText = 'Connection failed';
        document.getElementById('substatus').innerText = 'Could not reach localhost:1337';
        _appendLog('Failed to send token update result to receiver.');
      }
      isExtracting = false;
      poll();
      return;
    }

    if (msg.type === 'setup-repairs-done') {
      _disarmWatchdog();
      document.getElementById('status').innerText = 'Sending result...';
      try {
        await fetch('http://localhost:1337/sync-setup-repairs?fileKey=' + encodeURIComponent(_currentFileKey), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Figlets-Session': _sessionId },
          body: JSON.stringify(msg.data)
        });
        document.getElementById('status').innerText = 'Listening for Agent';
        document.getElementById('substatus').innerText = msg.data.error ? 'Repair failed.' : 'Setup repairs applied.';
        _appendLog(msg.data.error ? 'Setup repair failed in plugin.' : 'Setup repair result sent to receiver.');
      } catch (err) {
        document.getElementById('status').innerText = 'Connection failed';
        document.getElementById('substatus').innerText = 'Could not reach localhost:1337';
        _appendLog('Failed to send setup repair result to receiver.');
      }
      isExtracting = false;
      poll();
      return;
    }

    if (msg.type === 'figlets-reset-done') {
      _disarmWatchdog();
      document.getElementById('status').innerText = 'Sending result...';
      try {
        await fetch('http://localhost:1337/sync-reset-figlets-file?fileKey=' + encodeURIComponent(_currentFileKey), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Figlets-Session': _sessionId },
          body: JSON.stringify(msg.data)
        });
        document.getElementById('status').innerText = 'Listening for Agent';
        document.getElementById('substatus').innerText = msg.data.error ? 'Reset failed.' : 'File reset complete.';
        _appendLog(msg.data.error ? 'Reset failed in plugin.' : 'Reset result sent to receiver.');
      } catch (err) {
        document.getElementById('status').innerText = 'Connection failed';
        document.getElementById('substatus').innerText = 'Could not reach localhost:1337';
        _appendLog('Failed to send reset result to receiver.');
      }
      isExtracting = false;
      poll();
      return;
    }

    if (msg.type === 'qa-audit-done') {
      _disarmWatchdog();
      if (msg.data && msg.data.local) {
        document.getElementById('status').innerText = 'Listening for Agent';
        document.getElementById('substatus').innerText = msg.data.error ? 'QA failed.' : 'QA ready.';
        _renderQaReport(msg.data);
        _appendLog(msg.data.error ? 'Local QA failed.' : 'Local QA complete.');
        _setQaButtonsDisabled(false);
        isExtracting = false;
        poll();
        return;
      }

      document.getElementById('status').innerText = 'Sending result...';
      try {
        await fetch('http://localhost:1337/sync-qa-audit?fileKey=' + encodeURIComponent(_currentFileKey), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Figlets-Session': _sessionId },
          body: JSON.stringify(msg.data)
        });
        document.getElementById('status').innerText = 'Listening for Agent';
        document.getElementById('substatus').innerText = msg.data.error ? 'QA audit failed.' : 'QA audit complete.';
        _appendLog(msg.data.error ? 'QA audit failed in plugin.' : 'QA audit result sent to receiver.');
      } catch (err) {
        document.getElementById('status').innerText = 'Connection failed';
        document.getElementById('substatus').innerText = 'Could not reach localhost:1337';
        _appendLog('Failed to send QA audit result to receiver.');
      }
      isExtracting = false;
      poll();
      return;
    }

    if (msg.type === 'data-extracted' || msg.type === 'selection-extracted') {
      _disarmWatchdog();
      document.getElementById('status').innerText = 'Sending payload...';
      const endpoint = msg.type === 'selection-extracted' ? '/sync-selection' : '/sync';

      try {
        const response = await fetch('http://localhost:1337' + endpoint + '?fileKey=' + encodeURIComponent(_currentFileKey), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Figlets-Session': _sessionId },
          body: JSON.stringify(msg.data)
        });

        if (response.ok) {
          document.getElementById('status').innerText = 'Listening for Agent';
          document.getElementById('substatus').innerText = 'Last sync successful.';
          _appendLog(msg.type === 'selection-extracted' ? 'Selection payload sent to receiver.' : 'Snapshot payload sent to receiver.');
          parent.postMessage({ pluginMessage: { type: 'sync-success' } }, '*');
        } else {
          document.getElementById('status').innerText = 'Server Error';
          document.getElementById('substatus').innerText = 'Status: ' + response.status;
          _appendLog('Receiver returned status ' + response.status + '.');
        }
      } catch (err) {
        document.getElementById('status').innerText = 'Connection failed';
        document.getElementById('substatus').innerText = 'Could not reach localhost:1337';
        _appendLog('Failed to send payload to receiver.');
      }

      isExtracting = false;
      poll();
    }
  }

  document.getElementById('qa-check').onclick = function() { _runLocalQa(false); };
  document.getElementById('qa-fix').onclick = function() { _runLocalQa(true); };
  document.getElementById('log-toggle').onclick = function() { _setLogOpen(!_isLogOpen); };
  parent.postMessage({ pluginMessage: { type: 'ui-ready' } }, '*');
  _appendLog('Plugin UI ready.');
  poll();
</script>
